	<!DOCTYPE html>
	<html lang="en">
	<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trinity Med - Homework 2</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>

    <script>
        function displayDate() {
            const today = new Date();
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById("reviewOutput").innerHTML = reviewHtml;
document.getElementById("review-section").scrollIntoView({ behavior: "smooth" });
        }
    </script>
</head>

<body onload="displayDate()">
    <!-- Header section -->
    <div id="header">
        <img src="logo.png" alt="Trinity Med Logo" id="logo">
        <h1>Trinity Med</h1>
           <div id="date">
            Today is:
            <script>
                var today = new Date();
                document.write(today.toDateString());
            </script>
        </div>
    </div>

    <!-- Main form section -->
    <div id="main-content">
        <h2>Patient Registration Form</h2>

        <form id="form">
            <table>
                <!-- Name fields -->
                <tr>
                    <td><label for="fname">First Name:</label></td>
                    <td>
                        <input type="text" id="fname" name="fname"
                        title="Enter 1 to 30 characters. Letters, apostrophes, and dashes only."
                        pattern="[A-Za-z'-]{1,30}" required>
                    </td>

                    <td><label for="mi">Middle Initial:</label></td>
                    <td>
                        <input type="text" id="mi" name="mi"
                        title="Optional. Enter one letter only."
                        pattern="[A-Za-z]{1}" maxlength="1">
                    </td>

                    <td><label for="lname">Last Name:</label></td>
                    <td>
                        <input type="text" id="lname" name="lname"
                        title="Enter 1 to 30 characters. Letters, apostrophes, dashes, and numbers 2 to 5 only."
                        pattern="[A-Za-z2-5'-]{1,30}" required>
                    </td>
                </tr>

                <!-- DOB and ID -->
                <tr>
                    <td><label for="dob">Date of Birth:</label></td>
                    <td>
                        <input type="date" id="dob" name="dob"
                        title="Choose a valid birth date. It cannot be in the future or more than 120 years ago."
                        required>
                    </td>

                    <td><label for="ssn">ID Number:</label></td>
                    <td colspan="3">
                        <input type="password" id="ssn" name="ssn"
                        title="Enter a 9-digit ID number in the format 123-45-6789."
                        pattern="[0-9]{3}-[0-9]{2}-[0-9]{4}"
                        placeholder="123-45-6789" required>
                    </td>
                </tr>

                <!-- Contact info -->
                <tr>
                    <td><label for="email">Email Address:</label></td>
                    <td>
                        <input type="email" id="email" name="email"
                        title="Enter a valid email address in the format name@domain.com."
                        placeholder="name@domain.com" required>
                    </td>

                    <td><label for="phone">Phone Number:</label></td>
                    <td colspan="3">
                        <input type="text" id="phone" name="phone"
                        title="Enter a phone number in the format 123-456-7890."
                        pattern="[0-9]{3}-[0-9]{3}-[0-9]{4}"
                        placeholder="123-456-7890">
                    </td>
                </tr>

                <!-- Address -->
                <tr>
                    <td><label for="address1">Address Line 1:</label></td>
                    <td colspan="5">
                        <input type="text" id="address1" name="address1" class="long-input"
                        title="Required. Enter 2 to 30 characters."
                        pattern=".{2,30}" required>
                    </td>
                </tr>

                <tr>
                    <td><label for="address2">Address Line 2:</label></td>
                    <td colspan="5">
                        <input type="text" id="address2" name="address2" class="long-input"
                        title="Optional. If entered, use 2 to 30 characters."
                        pattern=".{2,30}">
                    </td>
                </tr>

                <tr>
                    <td><label for="city">City:</label></td>
                    <td>
                        <input type="text" id="city" name="city"
                        title="Required. Enter 2 to 30 characters."
                        pattern=".{2,30}" required>
                    </td>

                    <td><label for="state">State:</label></td>
                    <td>
                        <select id="state" name="state" title="Please select a state." required>
                            <option value="">Select</option>
                            <option value="AL">AL</option>
                            <option value="AK">AK</option>
                            <option value="AZ">AZ</option>
                            <option value="AR">AR</option>
                            <option value="CA">CA</option>
                            <option value="CO">CO</option>
                            <option value="CT">CT</option>
                            <option value="DE">DE</option>
                            <option value="DC">DC</option>
                            <option value="FL">FL</option>
                            <option value="GA">GA</option>
                            <option value="HI">HI</option>
                            <option value="ID">ID</option>
                            <option value="IL">IL</option>
                            <option value="IN">IN</option>
                            <option value="IA">IA</option>
                            <option value="KS">KS</option>
                            <option value="KY">KY</option>
                            <option value="LA">LA</option>
                            <option value="ME">ME</option>
                            <option value="MD">MD</option>
                            <option value="MA">MA</option>
                            <option value="MI">MI</option>
                            <option value="MN">MN</option>
                            <option value="MS">MS</option>
                            <option value="MO">MO</option>
                            <option value="MT">MT</option>
                            <option value="NE">NE</option>
                            <option value="NV">NV</option>
                            <option value="NH">NH</option>
                            <option value="NJ">NJ</option>
                            <option value="NM">NM</option>
                            <option value="NY">NY</option>
                            <option value="NC">NC</option>
                            <option value="ND">ND</option>
                            <option value="OH">OH</option>
                            <option value="OK">OK</option>
                            <option value="OR">OR</option>
                            <option value="PA">PA</option>
                            <option value="PR">PR</option>
                            <option value="RI">RI</option>
                            <option value="SC">SC</option>
                            <option value="SD">SD</option>
                            <option value="TN">TN</option>
                            <option value="TX">TX</option>
                            <option value="UT">UT</option>
                            <option value="VT">VT</option>
                            <option value="VA">VA</option>
                            <option value="WA">WA</option>
                            <option value="WV">WV</option>
                            <option value="WI">WI</option>
                            <option value="WY">WY</option>
                        </select>
                    </td>

                    <td><label for="zip">Zip Code:</label></td>
                    <td>
                        <input type="text" id="zip" name="zip"
                        title="Enter 5 digits or ZIP+4 in the format 12345 or 12345-6789."
                        pattern="[0-9]{5}(-[0-9]{4})?"
                        placeholder="77000 or 77000-1234" required>
                    </td>
                </tr>

                <!-- Checkboxes -->
                <tr>
                    <td class="top-align">Medical History:</td>
                    <td colspan="5" class="checkbox-group">
                        <label><input type="checkbox" name="history" value="Chicken Pox"> Chicken Pox</label>
                        <label><input type="checkbox" name="history" value="Measles"> Measles</label>
                        <label><input type="checkbox" name="history" value="Covid-19"> Covid-19</label>
                        <label><input type="checkbox" name="history" value="Small Pox"> Small Pox</label>
                        <label><input type="checkbox" name="history" value="Tetanus"> Tetanus</label>
                    </td>
                </tr>

                <!-- Radio groups -->
                <tr>
                    <td>Gender:</td>
                    <td colspan="5" class="radio-group">
                        <label><input type="radio" name="gender" value="Male" required> Male</label>
                        <label><input type="radio" name="gender" value="Female"> Female</label>
                        <label><input type="radio" name="gender" value="Other"> Other</label>
                    </td>
                </tr>

                <tr>
                    <td>Vaccinated:</td>
                    <td colspan="5" class="radio-group">
                        <label><input type="radio" name="vaccinated" value="Yes" required> Yes</label>
                        <label><input type="radio" name="vaccinated" value="No"> No</label>
                    </td>
                </tr>

                <tr>
                    <td>Insurance:</td>
                    <td colspan="5" class="radio-group">
                        <label><input type="radio" name="insurance" value="Yes" required> Yes</label>
                        <label><input type="radio" name="insurance" value="No"> No</label>
                        <label><input type="radio" name="insurance" value="Unsure"> Unsure</label>
                    </td>
                </tr>

                <!-- Slider -->
                <tr>
                    <td><label for="salary">Desired Salary:</label></td>
                    <td colspan="5">
                        <input type="range" id="salary" name="salary" min="20000" max="200000" step="5000" value="50000" oninput="updateSlider(this.value)">
                        <span id="healthValue">$50,000</span>
                    </td>
                </tr>

                <!-- Text area -->
                <tr>
                    <td><label for="symptoms">Current Symptoms:</label></td>
                    <td colspan="5">
                        <textarea id="symptoms" name="symptoms" rows="4" cols="50"
                        title="Optional. Describe your symptoms. Do not use double quotes."
                        pattern='[^"]*'
                        placeholder="Describe your current symptoms here."></textarea>
                    </td>
                </tr>

                <!-- User ID and passwords -->
                <tr>
                    <td><label for="userid">Desired User ID:</label></td>
                    <td>
                        <input type="text" id="userid" name="userid"
                        title="5 to 30 characters. Must begin with a letter. No spaces. Only letters, numbers, underscore, and dash are allowed."
                        pattern="[A-Za-z][A-Za-z0-9_-]{4,29}" required>
                    </td>

                    <td><label for="password">Password:</label></td>
                    <td>
                        <input type="password" id="password" name="password"
                        title="8 to 30 characters with at least 1 uppercase, 1 lowercase, 1 number, and 1 special character. No double quotes."
                        required>
                    </td>

                    <td><label for="confirmPassword">Re-enter Password:</label></td>
                    <td>
                        <input type="password" id="confirmPassword" name="confirmPassword"
                        title="Re-enter the same password." required>
                    </td>
                </tr>

                <!-- Buttons -->
                <tr>
                    <td colspan="6" class="button-row">
                        <button type="button" onclick="reviewForm()">Review</button>
                        <input type="reset" value="Clear" onclick="clearReview()">
                        <input type="submit" value="Submit">
                    </td>
                </tr>
            </table>
        </form>
    </div>

    <!-- Review section -->
    <div id="review-section">
        <h2>Review Your Information</h2>
        <div id="reviewOutput"></div>
    </div>

    <!-- Footer -->
    <div id="footer">
    Trinity Med Center | 7293 Trinity Rd | Galveston, TX 77297 |
    <p>Need assistance? <button onclick="alert('Contact us at support@trinitymedical.com')">Contact Us</button></p>
	<div>

    <!-- End of homework2.html document -->
</body>
</html>
